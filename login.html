<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login - RDC RAD SERVICE">
    <title>Login - RDC RAD SERVICE</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--light-bg);
            padding: 20px;
        }
        
        .login-container {
            background-color: var(--white);
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        
        .login-logo {
            width: 250px;
            margin: 0 auto 30px;
            display: block;
        }
        
        .login-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 10px;
        }
        
        .login-subtitle {
            font-size: 1rem;
            color: var(--gray);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .login-form {
            text-align: left;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1rem;
            transition: var(--transition);
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            border-color: var(--primary-color);
            outline: none;
        }
        
        .login-button {
            width: 100%;
            padding: 14px 20px;
            background-color: var(--primary-color);
            color: var(--dark);
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }
        
        .login-button:hover {
            background-color: #e6c200;
            transform: translateY(-2px);
        }
        
        .login-links {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }
        
        .login-links a {
            color: var(--gray);
            text-decoration: none;
            transition: var(--transition);
        }
        
        .login-links a:hover {
            color: var(--primary-color);
        }
        
        .back-home {
            margin-top: 20px;
            text-align: center;
        }
        
        .back-home a {
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        
        .back-home a:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <img src="assets/logo-rdc-no-nuclear-removebg-preview.png" alt="RDC RAD SERVICE" class="login-logo">
            
            <h2 class="login-title">Olá usuário.</h2>
            <p class="login-subtitle">Informe seu CPF ou CNPJ para iniciar o acesso.</p>
            
            <form action="#" method="POST" class="login-form">
                <div class="form-group">
                    <label for="cpf_cnpj">Informe o seu CPF ou CNPJ *</label>
                    <input type="text" id="cpf_cnpj" name="cpf_cnpj" placeholder="000.000.000-00 ou 00.000.000/0000-00" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Informe a sua senha *</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="login-button">Entrar</button>
            </form>
            
            <div class="login-links">
                <a href="#">Esqueci minha senha</a>
                <a href="#">Meu primeiro acesso</a>
            </div>
            
            <div class="back-home">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Voltar para o site</a>
            </div>
        </div>
    </div>
</body>
</html>
